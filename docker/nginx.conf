server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    # Security: deny access to notes data and config
    location ~* ^/_notes/ {
        deny all;
        return 403;
    }

    location = /config.php {
        deny all;
        return 403;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Static assets caching
    location ~* \.(css|js|ttf|woff|woff2|png|jpg|jpeg|svg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/css text/javascript application/javascript application/json text/xml application/xml font/ttf;

    # PHP handling + URL rewriting (replaces .htaccess)
    location / {
        try_files $uri $uri/ /index.php?note=$uri&$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param QUERY_STRING $query_string;
    }
}
